<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07090f"/>
      <stop offset="100%" stop-color="#141a2a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- ecosystem orbit -->
  <circle cx="512" cy="512" r="320" fill="none" stroke="url(#ring)" stroke-width="24" opacity="0.9"/>

  <!-- network links -->
  <g stroke="#5eead4" stroke-width="10" opacity="0.75">
    <line x1="512" y1="230" x2="760" y2="380"/>
    <line x1="760" y1="380" x2="700" y2="700"/>
    <line x1="700" y1="700" x2="360" y2="790"/>
    <line x1="360" y1="790" x2="230" y2="520"/>
    <line x1="230" y1="520" x2="320" y2="280"/>
    <line x1="320" y1="280" x2="512" y2="230"/>
  </g>

  <!-- nodes -->
  <g fill="#c4b5fd" filter="url(#glow)">
    <circle cx="512" cy="230" r="18"/>
    <circle cx="760" cy="380" r="18"/>
    <circle cx="700" cy="700" r="18"/>
    <circle cx="360" cy="790" r="18"/>
    <circle cx="230" cy="520" r="18"/>
    <circle cx="320" cy="280" r="18"/>
  </g>

  <!-- monogram -->
  <g fill="none" stroke="url(#ring)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M350 690V360l162 205 162-205v330"/>
  </g>

  <circle cx="512" cy="512" r="92" fill="none" stroke="#a78bfa" stroke-width="12" opacity="0.7"/>
</svg>
